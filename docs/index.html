<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CodingValley Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f8f9fb;--surface:#fff;--surface2:#f2f4f8;--border:#e8eaef;--border2:#d8dbe4;
  --ink:#1c1e26;--ink2:#5a5e72;--ink3:#9ea3b8;
  --blue:#3b6ef5;--blue-light:#eef2ff;
  --green:#18a058;--green-light:#e8f7ef;
  --orange:#e86830;--orange-light:#fff2ec;
  --red:#e03e3e;--red-light:#fff0f0;
  --yellow:#c98f00;--yellow-light:#fffaeb;
  --purple:#7c3aed;--purple-light:#f3eeff;
  --mono:'DM Mono',monospace;--sans:'Pretendard',-apple-system,sans-serif;
  --r:10px;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;}
.shell{max-width:1320px;margin:0 auto;padding:36px 32px 80px;}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;}
.logo{font-size:20px;font-weight:700;letter-spacing:-0.3px;}
.logo span{color:var(--blue);}
.header-right{display:flex;align-items:center;gap:12px;}
.schedule-badge{font-family:var(--mono);font-size:11px;color:var(--blue);background:var(--blue-light);border:1px solid #c7d5fc;padding:4px 12px;border-radius:100px;}
.updated{font-family:var(--mono);font-size:11px;color:var(--ink3);}
.status{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--ink3);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2.5s ease infinite;}
.dot.err{background:var(--red);animation:none;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
.divider{height:1px;background:var(--border);margin-bottom:24px;}

/* SECTION */
.sec{margin-bottom:24px;}
.sec-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.sec-title{font-size:13px;font-weight:600;color:var(--ink);}
.sec-tag{font-family:var(--mono);font-size:10px;color:var(--ink3);background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:4px;}
.sec-sub{font-size:12px;color:var(--ink3);}

/* GRIDS */
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;box-shadow:var(--shadow);}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow);border-top:3px solid var(--kpi-color,var(--border2));}
.kpi-label{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;}
.kpi-val{font-size:30px;font-weight:700;letter-spacing:-1px;line-height:1;}
.kpi-sub{font-size:11px;color:var(--ink3);margin-top:6px;}
.kpi-delta{display:inline-flex;align-items:center;gap:3px;font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:100px;margin-top:6px;}
.kpi-delta.up{background:var(--green-light);color:var(--green);}
.kpi-delta.dn{background:var(--red-light);color:var(--red);}

/* RETENTION IMPROVE CARDS */
.ret-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:12px;}
.ret-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.ret-card-label{font-size:12px;color:var(--ink2);line-height:1.5;flex:1;}
.ret-card-val{font-size:28px;font-weight:700;letter-spacing:-1px;flex-shrink:0;}
.ret-card-base{font-family:var(--mono);font-size:11px;color:var(--ink3);}
.ret-bar-bg{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.ret-bar-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.23,1,.32,1);}
.ret-insight{font-size:11px;color:var(--ink3);line-height:1.5;padding-top:8px;border-top:1px solid var(--border);}

/* DAU CHART */
.dau-wrap{display:flex;align-items:flex-end;gap:6px;height:160px;padding-top:4px;}
.b-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;}
.b-count{font-family:var(--mono);font-size:10px;color:var(--blue);font-weight:600;margin-bottom:2px;}
.b-bar{width:100%;border-radius:4px 4px 0 0;background:var(--blue);opacity:.5;transition:opacity .2s;min-height:3px;cursor:default;}
.b-bar:hover{opacity:1;}
.b-lbl-wrap{display:flex;flex-direction:column;align-items:center;gap:1px;margin-top:4px;}
.b-lbl-day{font-family:var(--mono);font-size:10px;font-weight:600;}
.b-lbl-date{font-family:var(--mono);font-size:9px;color:var(--ink3);}

/* LISTS */
.c-list{display:flex;flex-direction:column;gap:9px;}
.c-row{display:flex;align-items:center;gap:10px;}
.c-rank{font-family:var(--mono);font-size:10px;color:var(--ink3);width:18px;text-align:right;flex-shrink:0;}
.c-name{font-size:12px;color:var(--ink2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-track{width:72px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;flex-shrink:0;}
.c-fill{height:100%;border-radius:2px;}
.c-cnt{font-family:var(--mono);font-size:11px;color:var(--ink3);width:32px;text-align:right;flex-shrink:0;}

/* COMPARE TABLE */
.ctable{width:100%;border-collapse:collapse;}
.ctable th{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:8px 10px;text-align:left;border-bottom:2px solid var(--border);color:var(--ink3);}
.ctable th.ht{color:var(--blue);}
.ctable th.hd{color:var(--orange);}
.ctable td{padding:10px 10px;border-bottom:1px solid var(--border);font-size:12px;color:var(--ink2);}
.ctable tr:last-child td{border-bottom:none;}
.ctable td.num{font-family:var(--mono);font-size:12px;color:var(--ink);}
.chip{display:inline-block;padding:2px 8px;border-radius:100px;font-family:var(--mono);font-size:11px;}
.chip.g{background:var(--green-light);color:var(--green);}
.chip.n{background:var(--surface2);color:var(--ink3);}

/* FUNNEL */
.funnel{display:flex;flex-direction:column;}
.f-row{padding:10px 0;border-bottom:1px solid var(--border);}
.f-row:last-child{border-bottom:none;}
.f-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.f-left{display:flex;align-items:center;gap:8px;}
.f-num{font-family:var(--mono);font-size:10px;color:var(--ink3);background:var(--surface2);border:1px solid var(--border);padding:1px 6px;border-radius:4px;}
.f-step{font-size:13px;}
.f-right{display:flex;align-items:center;gap:8px;}
.f-count{font-family:var(--mono);font-size:13px;font-weight:600;}
.f-pct{font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:100px;}
.f-pct.hi{background:var(--green-light);color:var(--green);}
.f-pct.lo{background:var(--red-light);color:var(--red);}
.f-track{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.f-fill{height:100%;border-radius:2px;background:var(--blue);transition:width .8s cubic-bezier(.23,1,.32,1);}
.f-connector{text-align:center;padding:2px 0;font-size:10px;color:var(--ink3);}

/* BEHAVIOR */
.b-list{display:flex;flex-direction:column;gap:9px;}
.beh-row{display:flex;align-items:center;gap:8px;}
.beh-rk{font-family:var(--mono);font-size:10px;color:var(--ink3);width:16px;flex-shrink:0;}
.beh-nm{font-size:12px;color:var(--ink2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.beh-track{width:60px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;flex-shrink:0;}
.beh-fill{height:100%;border-radius:2px;}
.beh-cnt{font-family:var(--mono);font-size:11px;color:var(--ink3);width:28px;text-align:right;flex-shrink:0;}

/* INSIGHT GRID */
.ins-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.ins-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);}
.ins-badge{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:100px;display:inline-block;margin-bottom:10px;}
.ins-title{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.4;}
.ins-body{font-size:12px;color:var(--ink2);line-height:1.7;}
.ins-body strong{color:var(--ink);font-weight:600;}
.ins-action{margin-top:12px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;font-weight:500;}

/* LOADING */
.overlay{position:fixed;inset:0;background:rgba(248,249,251,.92);backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:100;transition:opacity .3s;}
.overlay.hidden{opacity:0;pointer-events:none;}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
.lmsg{font-family:var(--mono);font-size:12px;color:var(--ink3);}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fu{animation:fadeUp .4s ease both;}

@media(max-width:1100px){.g5{grid-template-columns:repeat(3,1fr);}.g4,.g3,.ins-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.g5,.g4,.g3,.g2,.ins-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="overlay" id="overlay"><div class="spinner"></div><div class="lmsg">데이터 불러오는 중…</div></div>
<div class="shell">

  <header class="header">
    <div class="logo">CodingValley <span>Analytics</span></div>
    <div class="header-right">
      <span class="schedule-badge">🕘 매일 09:00 KST 자동 갱신</span>
      <span class="updated" id="updatedAt"></span>
      <div class="status"><div class="dot" id="dot"></div><span id="statusTxt">로딩 중…</span></div>
    </div>
  </header>
  <div class="divider"></div>

  <!-- ① 유료회원 현황 KPI -->
  <div class="sec">
    <div class="sec-header"><span class="sec-title">유료회원 현황</span><span class="sec-tag">PAID USER STATUS</span><span class="sec-sub" id="paidCount"></span></div>
    <div class="g5" id="paidKpiGrid"></div>
  </div>

  <!-- ② DAU -->
  <div class="sec">
    <div class="sec-header"><span class="sec-title">일별 활성 사용자</span><span class="sec-tag">DAU TREND</span></div>
    <div class="card"><div class="dau-wrap" id="dauChart"></div></div>
  </div>

  <!-- ③ 리텐션 개선 지표 -->
  <div class="sec">
    <div class="sec-header"><span class="sec-title">리텐션 개선 지표</span><span class="sec-tag">RETENTION IMPROVE</span></div>
    <div class="g3" id="retImproveGrid"></div>
  </div>

  <!-- ④ 코스별 학습 Top10 + 코스별 무료체험 -->
  <div class="sec">
    <div class="g2">
      <div class="card">
        <div class="sec-header" style="margin-bottom:14px"><span class="sec-title">유료회원 코스별 학습 TOP 10</span><span class="sec-tag">APP</span></div>
        <div class="c-list" id="topCourseList"></div>
      </div>
      <div class="card">
        <div class="sec-header" style="margin-bottom:14px"><span class="sec-title">코스별 무료체험 TOP 10</span><span class="sec-tag">WEB</span></div>
        <div class="c-list" id="courseList"></div>
      </div>
    </div>
  </div>

  <!-- ⑤ 코호트 비교 -->
  <div class="sec">
    <div class="sec-header"><span class="sec-title">무료체험 후 구매 vs 바로 구매</span><span class="sec-tag">COHORT</span></div>
    <div class="card"><table class="ctable" id="cohortTable"></table></div>
  </div>

  <!-- ⑥ LDM7 퍼널 -->
  <div class="sec">
    <div class="sec-header"><span class="sec-title">LDM7 → 결제 완료 퍼널</span><span class="sec-tag">FUNNEL</span></div>
    <div class="card"><div class="funnel" id="funnelList"></div></div>
  </div>

  <!-- ⑦ 행동 분석 -->
  <div class="sec">
    <div class="g2">
      <div class="card">
        <div class="sec-header" style="margin-bottom:14px"><span class="sec-title">LDM7 방문 후 다음 행동</span><span class="sec-tag">BEHAVIOR</span></div>
        <div class="b-list" id="ldm7Beh"></div>
      </div>
      <div class="card">
        <div class="sec-header" style="margin-bottom:14px"><span class="sec-title">구매자 결제 전 방문 경로</span><span class="sec-tag">PATH</span></div>
        <div class="b-list" id="tossBeh"></div>
      </div>
    </div>
  </div>

  <!-- ⑧ PM 인사이트 -->
  <div class="sec">
    <div class="sec-header"><span class="sec-title">PM 인사이트</span><span class="sec-tag">INSIGHTS</span></div>
    <div class="ins-grid" id="insightGrid"></div>
  </div>

</div>
<script>
var DATA_URL='./data.json';
var fmt=function(n){return n==null?'—':Number(n).toLocaleString('ko-KR');};
var fmtH=function(ms){if(!ms)return'—';var h=ms/3600000;if(h<1)return Math.round(ms/60000)+'분';if(h<24)return Math.round(h)+'시간';return(h/24).toFixed(1)+'일';};
var fmtP=function(n){return n==null?'—':Number(n).toFixed(1)+'%';};
function setStatus(ok,msg){document.getElementById('dot').className='dot'+(ok?'':' err');document.getElementById('statusTxt').textContent=msg;}

/* 유료회원 현황 KPI */
function renderPaidKPI(d){
  var r=d.retention, pm=d.paidMetrics;
  document.getElementById('paidCount').textContent='유료회원 '+fmt(d.paidCount)+'명 기준';
  var items=[
    {label:'D3 리텐션',val:fmtP(r.d3Rate),sub:'구매 후 3일 내 앱 재방문',color:'#3b6ef5',extra:'<div class="kpi-sub">'+fmt(r.d3Count)+'/'+fmt(r.base)+'명</div>'},
    {label:'D7 리텐션',val:fmtP(r.d7Rate),sub:'구매 후 7일 내 앱 재방문',color:'#7c3aed',extra:'<div class="kpi-sub">'+fmt(r.d7Count)+'/'+fmt(r.base)+'명</div>'},
    {label:'주간 평균 방문',val:pm.avgWeeklyVisit+'회',sub:'유료회원 앱 방문 (주당)',color:'#18a058',extra:''},
    {label:'일 평균 학습 시간',val:pm.avgDailyStudyMin+'분',sub:'셀 시작~완료 기준',color:'#e86830',extra:''},
    {label:'일 평균 학습 수',val:pm.avgDailyCells+'개',sub:'app_start_cell 기준',color:'#c98f00',extra:''},
  ];
  document.getElementById('paidKpiGrid').innerHTML=items.map(function(c,i){
    return '<div class="kpi-card fu" style="--kpi-color:'+c.color+';animation-delay:'+(i*.06)+'s">'
      +'<div class="kpi-label">'+c.label+'</div>'
      +'<div class="kpi-val">'+c.val+'</div>'
      +'<div class="kpi-sub">'+c.sub+'</div>'
      +c.extra+'</div>';
  }).join('');
}

/* DAU */
function renderDAU(d){
  var el=document.getElementById('dauChart');
  if(!d.dau||!d.dau.length){el.innerHTML='<div style="color:var(--ink3);font-size:12px;padding:30px;flex:1">데이터 없음</div>';return;}
  var max=Math.max.apply(null,d.dau.map(function(x){return x.count;}));
  var days=['일','월','화','수','목','금','토'];
  el.innerHTML=d.dau.map(function(item){
    var h=max?Math.max(4,(item.count/max*100)):4;
    var dayName=days[new Date(item.date).getDay()];
    var isWeekend=dayName==='토'||dayName==='일';
    var color=isWeekend?'var(--orange)':'var(--blue)';
    return '<div class="b-col">'
      +'<div class="b-count">'+fmt(item.count)+'</div>'
      +'<div class="b-bar" style="height:'+h+'%;background:'+color+'" title="'+item.date+' · '+fmt(item.count)+'명"></div>'
      +'<div class="b-lbl-wrap">'
      +'<div class="b-lbl-day" style="color:'+(isWeekend?'var(--orange)':'var(--ink)')+'">'+dayName+'</div>'
      +'<div class="b-lbl-date">'+item.date.slice(5)+'</div>'
      +'</div></div>';
  }).join('');
}

/* 리텐션 개선 지표 */
function renderRetImprove(d){
  var ri=d.retentionImprove;
  var pm=d.paidMetrics;
  var items=[
    {
      label:'구매 후 3일 내 첫 학습 시작',
      val:fmtP(ri.first3DayRate),
      base:fmt(ri.first3DayCount)+'/'+fmt(d.retention.base)+'명',
      color:'var(--blue)',
      pct:ri.first3DayRate,
      insight:'구매 직후 학습 경험이 리텐션의 핵심. 3일 내 온보딩 넛지 강화가 필요해요.',
    },
    {
      label:'방문일에 학습 5개 이상 진행',
      val:fmtP(ri.deepLearningRate),
      base:fmt(ri.deepLearningCount)+'/'+fmt(d.paidCount)+'명',
      color:'var(--purple)',
      pct:ri.deepLearningRate,
      insight:'깊은 학습 경험이 재방문을 유도. 5개 이상 학습 시 완주 가능성이 높아져요.',
    },
    {
      label:'첫 학습 후 3일 내 재학습',
      val:fmtP(ri.quickReturnRate),
      base:fmt(ri.quickReturnCount)+'/'+fmt(ri.quickReturnBase)+'명',
      color:'var(--green)',
      pct:ri.quickReturnRate,
      insight:'첫 학습 후 빠른 복귀가 장기 리텐션의 핵심 신호. 학습 완료 후 알림이 효과적이에요.',
    },
  ];
  document.getElementById('retImproveGrid').innerHTML=items.map(function(c,i){
    return '<div class="ret-card fu" style="animation-delay:'+(i*.07)+'s">'
      +'<div class="ret-card-top">'
      +'<div class="ret-card-label">'+c.label+'</div>'
      +'<div class="ret-card-val" style="color:'+c.color+'">'+c.val+'</div>'
      +'</div>'
      +'<div class="ret-bar-bg"><div class="ret-bar-fill" style="width:'+Math.min(100,c.pct)+'%;background:'+c.color+'"></div></div>'
      +'<div class="ret-card-base">'+c.base+'</div>'
      +'<div class="ret-insight">'+c.insight+'</div>'
      +'</div>';
  }).join('');
}

/* 코스 리스트 */
function renderCourseList(elId, list, color){
  var el=document.getElementById(elId);
  var max=list&&list.length?list[0].count:1;
  el.innerHTML=list&&list.length?list.map(function(c,i){
    return '<div class="c-row"><span class="c-rank">'+(i+1)+'</span>'
      +'<span class="c-name" title="'+c.course+'">'+c.course+'</span>'
      +'<div class="c-track"><div class="c-fill" style="width:'+(c.count/max*100).toFixed(0)+'%;background:'+color+'"></div></div>'
      +'<span class="c-cnt">'+fmt(c.count)+'</span></div>';
  }).join(''):'<div style="color:var(--ink3);font-size:12px">데이터 없음</div>';
}

/* 코호트 */
function renderCohort(d){
  var t=d.cohort.trial,dr=d.cohort.direct;
  var rows=[
    {name:'구매자 수',tv:fmt(t.count)+'명',dv:fmt(dr.count)+'명',better:null},

    {name:'체험→구매 전환율',tv:fmtP(d.cohort.trialConversionRate),dv:'—',better:null},

    +rows.map(function(r){
      return '<tr><td>'+r.name+'</td>'

/* 퍼널 */
function renderFunnel(d){
  var steps=d.funnel||[];var first=steps.length?steps[0].count:1;
  document.getElementById('funnelList').innerHTML=steps.map(function(s,i){
    var fromPrev=i>0&&steps[i-1].count?(s.count/steps[i-1].count*100):null;
    var fromFirst=first?(s.count/first*100):0;
    var pctCls=fromPrev!=null?(fromPrev>=50?'hi':'lo'):'hi';
    var html='';
    if(i>0) html+='<div class="f-connector">↓ '+(fromPrev!=null?fromPrev.toFixed(1)+'% 유지':'')+'</div>';
    html+='<div class="f-row"><div class="f-top">'
      +'<div class="f-left"><span class="f-num">'+(i+1)+'</span><span class="f-step">'+s.step+'</span></div>'
      +'<div class="f-right"><span class="f-count">'+fmt(s.count)+'명</span>'
      +(fromPrev!=null?'<span class="f-pct '+pctCls+'">'+fromPrev.toFixed(1)+'%</span>':'')
      +'</div></div>'
      +'<div class="f-track"><div class="f-fill" style="width:'+Math.min(100,fromFirst).toFixed(1)+'%"></div></div>'
      +'</div>';
    return html;
  }).join('');
}

/* 행동 분석 */
function renderBeh(elId,list,color){
  var el=document.getElementById(elId);var max=list&&list.length?list[0].count:1;
  el.innerHTML=list&&list.length?list.map(function(b,i){
    var nm=b.action||b.page||'—';
    return '<div class="beh-row"><span class="beh-rk">'+(i+1)+'</span>'
      +'<span class="beh-nm" title="'+nm+'">'+nm+'</span>'
      +'<div class="beh-track"><div class="beh-fill" style="width:'+(b.count/max*100).toFixed(0)+'%;background:'+color+'"></div></div>'
      +'<span class="beh-cnt">'+fmt(b.count)+'</span></div>';
  }).join(''):'<div style="color:var(--ink3);font-size:12px">데이터 없음</div>';
}

/* 전체 렌더 */
function render(data){
  renderPaidKPI(data);
  renderDAU(data);
  renderRetImprove(data);
  renderCourseList('topCourseList', data.topCourses, 'var(--purple)');
  renderCourseList('courseList', data.courseTrials, 'var(--blue)');
  renderCohort(data);
  renderFunnel(data);
  renderBeh('ldm7Beh', data.ldm7Behavior, 'var(--blue)');
  renderBeh('tossBeh', data.tossPages, 'var(--orange)');
  renderInsights(data);
  if(data.meta&&data.meta.updatedAt){
    document.getElementById('updatedAt').textContent='Last updated '+new Date(data.meta.updatedAt).toLocaleString('ko-KR');
  }
}
