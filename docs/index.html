<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CodingValley Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f8f9fb;
  --surface:#ffffff;
  --surface2:#f2f4f8;
  --border:#e8eaef;
  --border2:#d8dbe4;
  --ink:#1c1e26;
  --ink2:#5a5e72;
  --ink3:#9ea3b8;
  --blue:#3b6ef5;
  --blue-light:#eef2ff;
  --green:#18a058;
  --green-light:#e8f7ef;
  --orange:#e86830;
  --orange-light:#fff2ec;
  --red:#e03e3e;
  --red-light:#fff0f0;
  --yellow:#c98f00;
  --yellow-light:#fffaeb;
  --mono:'DM Mono',monospace;
  --sans:'Pretendard',-apple-system,sans-serif;
  --r:10px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;}
.shell{max-width:1320px;margin:0 auto;padding:36px 32px 80px;}

/* ── HEADER ── */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;}
.logo{font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-0.3px;}
.logo span{color:var(--blue);}
.header-right{display:flex;align-items:center;gap:12px;}
.schedule-badge{font-family:var(--mono);font-size:11px;color:var(--blue);background:var(--blue-light);border:1px solid #c7d5fc;padding:4px 12px;border-radius:100px;}
.updated{font-family:var(--mono);font-size:11px;color:var(--ink3);}
.status{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--ink3);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2.5s ease infinite;}
.dot.err{background:var(--red);animation:none;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin-bottom:28px;}

/* ── SECTION ── */
.sec{margin-bottom:28px;}
.sec-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.sec-title{font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-0.1px;}
.sec-tag{font-family:var(--mono);font-size:10px;color:var(--ink3);background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:4px;}

/* ── GRIDS ── */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;box-shadow:var(--shadow);}

/* ── KPI CARD ── */
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;box-shadow:var(--shadow);border-top:3px solid var(--kpi-color,var(--border2));}
.kpi-label{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;}
.kpi-val{font-size:34px;font-weight:700;letter-spacing:-1.5px;line-height:1;color:var(--ink);}
.kpi-sub{font-size:12px;color:var(--ink3);margin-top:7px;}
.kpi-delta{display:inline-flex;align-items:center;gap:3px;font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:100px;margin-top:6px;}
.kpi-delta.up{background:var(--green-light);color:var(--green);}
.kpi-delta.dn{background:var(--red-light);color:var(--red);}

/* ── DAU CHART ── */
.dau-wrap{display:flex;align-items:flex-end;gap:3px;height:90px;padding-top:4px;}
.b-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;}
.b-bar{width:100%;border-radius:3px 3px 0 0;background:var(--blue);opacity:.55;transition:opacity .15s;min-height:3px;cursor:default;}
.b-bar:hover{opacity:1;}
.b-lbl{font-family:var(--mono);font-size:9px;color:var(--ink3);white-space:nowrap;}

/* ── COURSE LIST ── */
.c-list{display:flex;flex-direction:column;gap:9px;}
.c-row{display:flex;align-items:center;gap:10px;}
.c-rank{font-family:var(--mono);font-size:10px;color:var(--ink3);width:18px;text-align:right;flex-shrink:0;}
.c-name{font-size:12px;color:var(--ink2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-track{width:72px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;flex-shrink:0;}
.c-fill{height:100%;border-radius:2px;background:var(--blue);opacity:.6;}
.c-cnt{font-family:var(--mono);font-size:11px;color:var(--ink3);width:28px;text-align:right;flex-shrink:0;}

/* ── COMPARE TABLE ── */
.ctable{width:100%;border-collapse:collapse;}
.ctable th{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:8px 10px;text-align:left;border-bottom:2px solid var(--border);color:var(--ink3);}
.ctable th.ht{color:var(--blue);}
.ctable th.hd{color:var(--orange);}
.ctable td{padding:10px 10px;border-bottom:1px solid var(--border);font-size:12px;color:var(--ink2);}
.ctable tr:last-child td{border-bottom:none;}
.ctable td.num{font-family:var(--mono);font-size:12px;color:var(--ink);}
.chip{display:inline-block;padding:2px 8px;border-radius:100px;font-family:var(--mono);font-size:11px;}
.chip.g{background:var(--green-light);color:var(--green);}
.chip.n{background:var(--surface2);color:var(--ink3);}

/* ── FUNNEL ── */
.funnel{display:flex;flex-direction:column;}
.f-row{padding:11px 0;border-bottom:1px solid var(--border);}
.f-row:last-child{border-bottom:none;}
.f-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.f-left{display:flex;align-items:center;gap:8px;}
.f-num{font-family:var(--mono);font-size:10px;color:var(--ink3);background:var(--surface2);border:1px solid var(--border);padding:1px 6px;border-radius:4px;}
.f-step{font-size:13px;color:var(--ink);}
.f-right{display:flex;align-items:center;gap:8px;}
.f-count{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--ink);}
.f-pct{font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:100px;}
.f-pct.hi{background:var(--green-light);color:var(--green);}
.f-pct.lo{background:var(--red-light);color:var(--red);}
.f-track{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.f-fill{height:100%;border-radius:2px;background:var(--blue);transition:width .8s cubic-bezier(.23,1,.32,1);}
.f-connector{text-align:center;padding:3px 0;font-size:10px;color:var(--ink3);}

/* ── BEHAVIOR LIST ── */
.b-list{display:flex;flex-direction:column;gap:9px;}
.beh-row{display:flex;align-items:center;gap:8px;}
.beh-rk{font-family:var(--mono);font-size:10px;color:var(--ink3);width:16px;flex-shrink:0;}
.beh-nm{font-size:12px;color:var(--ink2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.beh-track{width:60px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;flex-shrink:0;}
.beh-fill{height:100%;border-radius:2px;}
.beh-cnt{font-family:var(--mono);font-size:11px;color:var(--ink3);width:28px;text-align:right;flex-shrink:0;}

/* ── INSIGHT GRID ── */
.ins-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.ins-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:0;}
.ins-top{display:flex;align-items:center;gap:7px;margin-bottom:10px;}
.ins-badge{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:100px;flex-shrink:0;}
.ins-title{font-size:13px;font-weight:600;color:var(--ink);line-height:1.4;margin-bottom:8px;}
.ins-body{font-size:12px;color:var(--ink2);line-height:1.7;flex:1;}
.ins-body strong{color:var(--ink);font-weight:600;}
.ins-action{margin-top:14px;padding-top:12px;border-top:1px solid var(--border);font-size:12px;font-weight:500;}

/* ── LOADING ── */
.overlay{position:fixed;inset:0;background:rgba(248,249,251,.92);backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:100;transition:opacity .3s;}
.overlay.hidden{opacity:0;pointer-events:none;}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
.lmsg{font-family:var(--mono);font-size:12px;color:var(--ink3);}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fu{animation:fadeUp .4s ease both;}

/* ── RESPONSIVE ── */
@media(max-width:1000px){.g4,.g3,.ins-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.g4,.g3,.g2,.ins-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div class="lmsg" id="lmsg">데이터 불러오는 중…</div>
</div>

<div class="shell">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">CodingValley <span>Analytics</span></div>
    <div class="header-right">
      <span class="schedule-badge">🕘 매일 09:00 KST 자동 갱신</span>
      <span class="updated" id="updatedAt"></span>
      <div class="status"><div class="dot" id="dot"></div><span id="statusTxt">로딩 중…</span></div>
    </div>
  </header>
  <div class="divider"></div>

  <!-- KPI -->
  <div class="sec">
    <div class="sec-header"><span class="sec-title">핵심 지표</span><span class="sec-tag">KPI</span></div>
    <div class="g4" id="kpiGrid"></div>
  </div>

  <!-- DAU -->
  <div class="sec">
    <div class="sec-header"><span class="sec-title">일별 활성 사용자</span><span class="sec-tag">DAU TREND</span></div>
    <div class="card"><div class="dau-wrap" id="dauChart"></div></div>
  </div>

  <!-- COURSE + COHORT -->
  <div class="sec">
    <div class="g2">
      <div class="card">
        <div class="sec-header" style="margin-bottom:14px"><span class="sec-title">코스별 무료체험 TOP 10</span><span class="sec-tag">TRIAL</span></div>
        <div class="c-list" id="courseList"></div>
      </div>
      <div class="card">
        <div class="sec-header" style="margin-bottom:14px"><span class="sec-title">무료체험 후 구매 vs 바로 구매</span><span class="sec-tag">COHORT</span></div>
        <table class="ctable" id="cohortTable"></table>
      </div>
    </div>
  </div>

  <!-- FUNNEL -->
  <div class="sec">
    <div class="sec-header"><span class="sec-title">LDM7 → 결제 완료 퍼널</span><span class="sec-tag">FUNNEL</span></div>
    <div class="card"><div class="funnel" id="funnelList"></div></div>
  </div>

  <!-- BEHAVIOR -->
  <div class="sec">
    <div class="g2">
      <div class="card">
        <div class="sec-header" style="margin-bottom:14px"><span class="sec-title">LDM7 방문 후 다음 행동</span><span class="sec-tag">BEHAVIOR</span></div>
        <div class="b-list" id="ldm7Beh"></div>
      </div>
      <div class="card">
        <div class="sec-header" style="margin-bottom:14px"><span class="sec-title">구매자 결제 전 방문 경로</span><span class="sec-tag">PATH</span></div>
        <div class="b-list" id="tossBeh"></div>
      </div>
    </div>
  </div>

  <!-- INSIGHTS -->
  <div class="sec">
    <div class="sec-header"><span class="sec-title">PM 인사이트</span><span class="sec-tag">INSIGHTS</span></div>
    <div class="ins-grid" id="insightGrid"></div>
  </div>

</div>

<script>
var DATA_URL='./data.json';
var fmt=function(n){return n==null?'—':Number(n).toLocaleString('ko-KR');};
var fmtH=function(ms){if(!ms)return'—';var h=ms/3600000;if(h<1)return Math.round(ms/60000)+'분';if(h<24)return Math.round(h)+'시간';return(h/24).toFixed(1)+'일';};
var fmtP=function(n){return n==null?'—':Number(n).toFixed(1)+'%';};

function setStatus(ok,msg){document.getElementById('dot').className='dot'+(ok?'':' err');document.getElementById('statusTxt').textContent=msg;}

/* KPI */
function renderKPI(d){
  var dau=d.dau&&d.dau.length?d.dau[d.dau.length-1].count:0;
  var prev=d.dau&&d.dau.length>1?d.dau[d.dau.length-2].count:null;
  var delta=prev&&prev>0?((dau-prev)/prev*100):null;
  var deltaHtml=delta!=null?'<div class="kpi-delta '+(delta>=0?'up':'dn')+'">'+(delta>=0?'▲ +':'▼ ')+delta.toFixed(1)+'% 전일</div>':'';
  var items=[
    {label:'MAU',val:fmt(d.mau),sub:'기간 내 순 방문자',color:'#3b6ef5',extra:''},
    {label:'DAU',val:fmt(dau),sub:'어제 기준',color:'#3b6ef5',extra:deltaHtml},
    {label:'셀체험 전환율',val:fmtP(d.cohort.trialConversionRate),sub:'체험자 '+fmt(d.cohort.totalTrialUsers)+'명 중',color:'#18a058',extra:''},
    {label:'바로 구매',val:fmt(d.cohort.direct.count),sub:'구매자 중 미체험',color:'#e86830',extra:''},
  ];
  document.getElementById('kpiGrid').innerHTML=items.map(function(c,i){
    return '<div class="kpi-card fu" style="--kpi-color:'+c.color+';animation-delay:'+(i*.07)+'s">'
      +'<div class="kpi-label">'+c.label+'</div>'
      +'<div class="kpi-val">'+c.val+'</div>'
      +'<div class="kpi-sub">'+c.sub+'</div>'
      +c.extra+'</div>';
  }).join('');
}

/* DAU */
function renderDAU(d){
  var el=document.getElementById('dauChart');
  if(!d.dau||!d.dau.length){el.innerHTML='<div style="color:var(--ink3);font-size:12px;padding:30px;flex:1">데이터 없음</div>';return;}
  var max=Math.max.apply(null,d.dau.map(function(x){return x.count;}));
  el.innerHTML=d.dau.map(function(item){
    var h=max?Math.max(4,(item.count/max*100)):4;
    return '<div class="b-col"><div class="b-bar" style="height:'+h+'%" title="'+item.date+' · '+fmt(item.count)+'명"></div><div class="b-lbl">'+item.date.slice(5)+'</div></div>';
  }).join('');
}

/* COURSE */
function renderCourse(d){
  var list=d.courseTrials||[];var max=list.length?list[0].count:1;
  document.getElementById('courseList').innerHTML=list.length?list.map(function(c,i){
    return '<div class="c-row"><span class="c-rank">'+(i+1)+'</span><span class="c-name" title="'+c.course+'">'+c.course+'</span><div class="c-track"><div class="c-fill" style="width:'+(c.count/max*100).toFixed(0)+'%"></div></div><span class="c-cnt">'+fmt(c.count)+'</span></div>';
  }).join(''):'<div style="color:var(--ink3);font-size:12px">데이터 없음</div>';
}

/* COHORT */
function renderCohort(d){
  var t=d.cohort.trial,dr=d.cohort.direct;
  var rows=[
    {name:'구매자 수',tv:fmt(t.count)+'명',dv:fmt(dr.count)+'명',better:null},
    {name:'구매까지 시간(중앙값)',tv:fmtH(t.medianTime),dv:fmtH(dr.medianTime),better:t.medianTime&&dr.medianTime?(t.medianTime<dr.medianTime?'t':'d'):null},
    {name:'쿠폰 사용률',tv:fmtP(t.couponRate),dv:fmtP(dr.couponRate),better:t.couponRate!=null&&dr.couponRate!=null?(t.couponRate<dr.couponRate?'t':'d'):null},
    {name:'평균 방문 횟수',tv:t.avgVisits+'회',dv:dr.avgVisits+'회',better:t.avgVisits>dr.avgVisits?'t':'d'},
    {name:'체험→구매 전환율',tv:fmtP(d.cohort.trialConversionRate),dv:'—',better:null},
  ];
  document.getElementById('cohortTable').innerHTML=
    '<thead><tr><th>지표</th><th class="ht">🔵 셀체험 후 구매</th><th class="hd">🟠 바로 구매</th></tr></thead><tbody>'
    +rows.map(function(r){
      return '<tr><td>'+r.name+'</td>'
        +'<td class="num"><span class="chip '+(r.better==='t'?'g':'n')+'">'+r.tv+'</span></td>'
        +'<td class="num"><span class="chip '+(r.better==='d'?'g':'n')+'">'+r.dv+'</span></td></tr>';
    }).join('')+'</tbody>';
}

/* FUNNEL */
function renderFunnel(d){
  var steps=d.funnel||[];var first=steps.length?steps[0].count:1;
  document.getElementById('funnelList').innerHTML=steps.map(function(s,i){
    var fromPrev=i>0&&steps[i-1].count?(s.count/steps[i-1].count*100):null;
    var fromFirst=first?(s.count/first*100):0;
    var pctCls=fromPrev!=null?(fromPrev>=50?'hi':'lo'):'hi';
    var html='';
    if(i>0) html+='<div class="f-connector">↓ '+(fromPrev!=null?fromPrev.toFixed(1)+'% 유지':'')+'</div>';
    html+='<div class="f-row"><div class="f-top">'
      +'<div class="f-left"><span class="f-num">'+(i+1)+'</span><span class="f-step">'+s.step+'</span></div>'
      +'<div class="f-right"><span class="f-count">'+fmt(s.count)+'명</span>'
      +(fromPrev!=null?'<span class="f-pct '+pctCls+'">'+fromPrev.toFixed(1)+'%</span>':'')
      +'</div></div>'
      +'<div class="f-track"><div class="f-fill" style="width:'+Math.min(100,fromFirst).toFixed(1)+'%"></div></div>'
      +'</div>';
    return html;
  }).join('');
}

/* BEHAVIOR */
function renderBeh(elId,list,color){
  var el=document.getElementById(elId);var max=list&&list.length?list[0].count:1;
  el.innerHTML=list&&list.length?list.map(function(b,i){
    var nm=b.action||b.page||'—';
    return '<div class="beh-row"><span class="beh-rk">'+(i+1)+'</span><span class="beh-nm" title="'+nm+'">'+nm+'</span><div class="beh-track"><div class="beh-fill" style="width:'+(b.count/max*100).toFixed(0)+'%;background:'+color+'"></div></div><span class="beh-cnt">'+fmt(b.count)+'</span></div>';
  }).join(''):'<div style="color:var(--ink3);font-size:12px">데이터 없음</div>';
}

/* INSIGHTS */
function renderInsights(d){
  var t=d.cohort.trial,dr=d.cohort.direct;
  var funnel=d.funnel||[];
  var s0=funnel[0]?funnel[0].count:0,s1=funnel[1]?funnel[1].count:0,s2=funnel[2]?funnel[2].count:0,sLast=funnel[funnel.length-1]?funnel[funnel.length-1].count:0;
  var scrollRate=s0?+(s1/s0*100).toFixed(1):0;
  var couponRate=s1?+(s2/s1*100).toFixed(1):0;
  var overallConv=s0?+(sLast/s0*100).toFixed(1):0;
  var timeDiff=t.medianTime&&dr.medianTime?Math.round((dr.medianTime-t.medianTime)/3600000):null;
  var couponGap=t.couponRate!=null&&dr.couponRate!=null?(dr.couponRate-t.couponRate).toFixed(1):null;

  var cards=[
    {
      badge:'이탈 분석',badgeBg:'#fff0f0',badgeColor:'#e03e3e',accentColor:'#e03e3e',
      title:'LDM7 상단 이탈이 핵심 병목',
      body:'LDM7 방문자 <strong>'+fmt(s0)+'명</strong> 중 스크롤 5%를 넘긴 비율은 <strong>'+scrollRate+'%</strong>입니다. 절반 가까이가 첫 화면에서 이탈하고 있어요. 히어로 섹션의 메시지와 CTA가 충분히 흥미를 유발하지 못하는 신호입니다.',
      action:'👉 히어로 섹션 카피 A/B 테스트 우선 진행',
      actionColor:'#e03e3e',
    },
    {
      badge:'전환 기회',badgeBg:'#fffaeb',badgeColor:'#c98f00',accentColor:'#c98f00',
      title:'쿠폰 모달 전환율 집중 개선 필요',

/* RENDER */
function render(data){
  renderKPI(data); renderDAU(data); renderCourse(data);
  renderCohort(data); renderFunnel(data);
  renderBeh('ldm7Beh',data.ldm7Behavior,'#3b6ef5');
  renderBeh('tossBeh',data.tossPages,'#e86830');
  renderInsights(data);
  if(data.meta&&data.meta.updatedAt){
    document.getElementById('updatedAt').textContent='Last updated '+new Date(data.meta.updatedAt).toLocaleString('ko-KR');
  }
}
